name: flutter_seekserve
description: "Flutter FFI plugin for SeekServe torrent streaming SDK."
version: 0.1.0
homepage: https://github.com/mapo80/seekserve

environment:
  sdk: ^3.10.8
  flutter: '>=3.3.0'

dependencies:
  ffi: ^2.1.3
  flutter:
    sdk: flutter

dev_dependencies:
  ffigen: ^13.0.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
